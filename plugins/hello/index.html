<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Hello Plugin</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        font: 13px system-ui, sans-serif;
        color: var(--tz-text, #e6e6e6);
        background: var(--tz-bg, #1b1b1d);
        padding: 12px;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 8px;
      }
      .row {
        margin: 6px 0;
      }
      .k {
        color: var(--tz-text-muted, #9a9a9a);
      }
      .v {
        font-weight: 600;
      }
      .err {
        color: #e2706e;
        font-weight: 400;
      }
      code {
        font-family: var(--tz-font-mono, ui-monospace, monospace);
      }
    </style>
  </head>
  <body>
    <h1>Hello from a sandboxed plugin</h1>
    <p class="k" style="margin: 0 0 10px">
      No Tauri bridge here — everything below came through the capability broker.
    </p>
    <div class="row">
      <span class="k">storage counter (persisted in vault KV):</span>
      <span class="v" id="count">…</span>
    </div>
    <div class="row">
      <span class="k">session.meta id=1:</span>
      <span class="v" id="sess">…</span>
    </div>

    <script>
      // Minimal plugin SDK shim: correlate postMessage RPCs by reqId.
      const pending = new Map();
      let seq = 0;
      window.addEventListener("message", (e) => {
        const d = e.data;
        if (d && d.__termzTheme && d.tokens) {
          const s = document.documentElement.style;
          for (const k in d.tokens) if (d.tokens[k]) s.setProperty("--tz-" + k, d.tokens[k]);
          return;
        }
        if (d && d.__termzPluginReply) {
          const p = pending.get(d.reqId);
          if (p) {
            pending.delete(d.reqId);
            d.ok ? p.resolve(d.result) : p.reject(new Error(d.error));
          }
        }
      });
      function invoke(capability, params) {
        return new Promise((resolve, reject) => {
          const reqId = ++seq;
          pending.set(reqId, { resolve, reject });
          parent.postMessage(
            { __termzPlugin: true, reqId, capability, params },
            "*",
          );
        });
      }

      (async () => {
        const countEl = document.getElementById("count");
        const sessEl = document.getElementById("sess");
        try {
          const g = await invoke("storage.get", { key: "count" });
          let n = (parseInt(g && g.value, 10) || 0) + 1;
          await invoke("storage.set", { key: "count", value: String(n) });
          countEl.textContent = String(n);
        } catch (e) {
          countEl.innerHTML = '<span class="err">' + e.message + "</span>";
        }
        try {
          const s = await invoke("session.meta", { id: 1 });
          sessEl.textContent = s ? s.name + " (" + s.kind + ")" : "none";
        } catch (e) {
          sessEl.innerHTML = '<span class="err">' + e.message + "</span>";
        }
      })();
    </script>
  </body>
</html>
