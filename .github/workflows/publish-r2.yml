name: Publish registry to R2

# Syncs the official plugin store (registry.json + signed bundles) to the
# Cloudflare R2 distribution bucket, served at https://dl.termz.app. The app's
# DEFAULT_REGISTRY_URL points at https://dl.termz.app/plugins/registry.json, so
# this is what makes the in-app store work once the source repos are private.
#
# Layout on R2 (mirrors how the app resolves the manifest field
# "plugins/<id>/manifest.json" relative to the registry URL's directory):
#   /plugins/registry.json
#   /plugins/plugins/<id>/manifest.json  (+ manifest.json.sig, entry files)
# The doubled "plugins/" is intentional and never user-visible.
#
# INERT until R2 is configured: every meaningful step is gated on the
# R2_ACCESS_KEY_ID secret, so with no secrets the job is a harmless no-op.
#
# Required repo secrets (same R2 token as the app repo's publish-dist.yml):
#   R2_ACCOUNT_ID, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_BUCKET

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip if R2 not configured
        if: env.R2_ACCESS_KEY_ID == ''
        run: echo "::notice::R2 secrets not set — skipping registry publish."

      - name: Setup Node 20
        if: env.R2_ACCESS_KEY_ID != ''
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Refuse to publish a stale index or a bad signature — same gates as
      # validate.yml, re-run here so a direct push to main can't ship a
      # mismatched store.
      - name: registry.json is up to date
        if: env.R2_ACCESS_KEY_ID != ''
        run: node tools/build-registry.mjs --check

      - name: Official signatures verify
        if: env.R2_ACCESS_KEY_ID != ''
        run: bash tools/verify-signatures.sh

      - name: Publish to R2
        if: env.R2_ACCESS_KEY_ID != ''
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_REQUEST_CHECKSUM_CALCULATION: WHEN_REQUIRED
          AWS_RESPONSE_CHECKSUM_VALIDATION: WHEN_REQUIRED
        run: |
          set -euo pipefail
          EP="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          # Official bundles (manifest.json, manifest.json.sig, entry files).
          # --delete keeps R2 in step with the repo (removes pulled plugins).
          aws s3 sync plugins "s3://${R2_BUCKET}/plugins/plugins/" --delete \
            --endpoint-url "$EP" --cache-control "public, max-age=300"
          # The index — short cache so store changes surface quickly.
          aws s3 cp registry.json "s3://${R2_BUCKET}/plugins/registry.json" \
            --endpoint-url "$EP" \
            --content-type application/json \
            --cache-control "no-cache, max-age=60"
          echo "Published registry + $(ls -1 plugins | wc -l) plugin dir(s) to r2://${R2_BUCKET}/plugins/"
