name: validate-registry

# On every push / PR: confirm registry.json is regenerated from the plugins/
# directory and that every official signature verifies against the public key.
# Signing is NOT done here — the private key never touches CI; the maintainer
# signs locally and commits the .sig.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: registry.json is up to date
        run: node tools/build-registry.mjs --check

      - name: official signatures verify
        run: bash tools/verify-signatures.sh
